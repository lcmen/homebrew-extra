name: Update Formulas

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  update-formulas:
    runs-on: macos-latest
    strategy:
      matrix:
        formula:
          - Formula/neovim_bin.rb
          - Formula/go_pty.rb
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update formula
        id: update
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          .github/scripts/update-formula.sh "${{ matrix.formula }}"

      - name: Check for existing PR
        if: steps.update.outputs.needs_update == 'true'
        id: check_pr
        run: |
          BRANCH="update-${{ matrix.formula }}-${{ steps.update.outputs.version }}"
          if gh pr list --head "$BRANCH" --state open --json number | jq -e '. | length > 0' > /dev/null; then
            echo "PR already exists for this version"
            echo "skip_pr=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip_pr=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create Pull Request
        if: steps.update.outputs.needs_update == 'true' && steps.check_pr.outputs.skip_pr != 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: |
            Update ${{ matrix.formula }} to v${{ steps.update.outputs.version }}

            Co-Authored-By: GitHub Actions <noreply@github.com>
          branch: update-${{ matrix.formula }}-${{ steps.update.outputs.version }}
          delete-branch: true
          title: "Update ${{ matrix.formula }} to v${{ steps.update.outputs.version }}"
          body: |
            Update ${{ matrix.formula }} to v${{ steps.update.outputs.version }}

            See https://github.com/${{ steps.update.outputs.github_repo }}/releases/tag/v${{ steps.update.outputs.version }}

            🤖 Generated by GitHub Actions
          labels: automated
